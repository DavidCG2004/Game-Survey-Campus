<ion-content class="ion-padding">
  <div class="login-container">
    
    <!-- Encabezado del Login -->
    <div class="header-section">
      <h1>Bienvenido</h1>
      <p>Inicia sesión para continuar a nuestra app.</p>
    </div>

    <!-- Formulario -->
    <div class="form-section">
      <!-- Sintaxis moderna Ionic 7+ -->
      <ion-input
        type="email"
        label="Correo electrónico"
        labelPlacement="floating"
        fill="outline"
        shape="round"
        class="minimal-input"
        [(ngModel)]="email">
        <ion-icon slot="start" name="mail-outline" aria-hidden="true"></ion-icon>
      </ion-input>

      <ion-input
        type="password"
        label="Contraseña"
        labelPlacement="floating"
        fill="outline"
        shape="round"
        class="minimal-input ion-margin-top"
        [(ngModel)]="password">
        <ion-icon slot="start" name="lock-closed-outline" aria-hidden="true"></ion-icon>
      </ion-input>
    </div>

    <!-- Botones de Acción -->
    <div class="action-section">
      <ion-button expand="block" shape="round" class="btn-primary" (click)="login()">
        Iniciar Sesión
      </ion-button>

      <ion-button expand="block" fill="clear" shape="round" class="btn-secondary" (click)="register()">
        Crear una cuenta nueva
      </ion-button>
    </div>

  </div>
</ion-content>
